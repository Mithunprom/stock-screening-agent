name: Hourly Update

on:
  workflow_dispatch:
  schedule:
    # Narrow UTC windows covering NYSE market hours across Pacific Standard Time.
    - cron: "0 14-21 * 1,2,3,11,12 1-5"
    # Narrow UTC windows covering NYSE market hours across Pacific Daylight Time.
    - cron: "0 13-20 * 4,5,6,7,8,9,10 1-5"

jobs:
  run-hourly-update:
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt

      - name: Run hourly job
        env:
          SMTP_HOST: ${{ secrets.SMTP_HOST }}
          SMTP_PORT: ${{ secrets.SMTP_PORT }}
          SMTP_USER: ${{ secrets.SMTP_USER }}
          SMTP_PASS: ${{ secrets.SMTP_PASS }}
          EMAIL_FROM: ${{ secrets.EMAIL_FROM }}
          EMAIL_TO: ${{ secrets.EMAIL_TO }}
          APP_USERNAME: ${{ secrets.APP_USERNAME }}
          APP_PASSWORD: ${{ secrets.APP_PASSWORD }}
          GITHUB_STATE_REPO: Mithunprom/stock-screening-agent
          GITHUB_STATE_BRANCH: state
          GITHUB_STATE_TOKEN: ${{ github.token }}
          SCREENER_TIMEZONE: America/Los_Angeles
        run: python -m src.pipelines.hourly_job
